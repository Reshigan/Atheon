name: Staging E2E

# Roadmap C6 — runs the Playwright suite against the staging deployment
# at https://staging.atheon.vantax.co.za. The intent is to catch regressions
# the day they merge to main, not at the 02:30 UTC production-e2e cron, so
# this fires automatically whenever a staging deploy succeeds (via the
# `workflow_run` trigger on the Deploy Workers API workflow's staging path).
#
# Triggers:
#   - workflow_run:       after "Deploy Workers API" completes (staging branch)
#   - workflow_dispatch:  ad-hoc — used while shaking out flaky tests
#   - pull_request:       hand-curated paths that change runtime behaviour;
#                         we skip docs/config-only PRs to keep CI minutes sane
#
# Required secrets (in `staging` environment, NOT repo-level):
#   - E2E_STAGING_LOGIN_EMAIL    — staging service account
#   - E2E_STAGING_LOGIN_PASSWORD — its password
#   - E2E_STAGING_LOGIN_TOTP_SEED (optional, only needed if MFA enforced)
#
# Required vars:
#   - STAGING_BASE_URL — defaults to https://staging.atheon.vantax.co.za
#
# CI mode: 2 retries, 1 worker — matches production-e2e so flake characteristics
# stay comparable across environments. Failures upload Playwright trace +
# screenshots so on-call can triage without re-running.
#
# Workflow-injection safety: every value sourced from `inputs.*` or
# `github.event.*` is read into a step-level env var before any shell
# interpolation, per
# https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/

on:
  workflow_run:
    workflows: ['Deploy Workers API']
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why this run? (logged for audit)'
        required: false
        default: 'manual smoke'
  pull_request:
    branches: [main]
    paths:
      - 'workers/api/src/**'
      - 'src/**'
      - 'e2e/**'

concurrency:
  # Allow multiple PR runs in parallel, but serialize post-deploy runs so we
  # don't double-fire when a deploy lands during a manual dispatch.
  group: staging-e2e-${{ github.event_name == 'pull_request' && github.event.pull_request.number || 'main' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  e2e:
    name: Run Playwright suite against staging
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 30
    # Skip when the upstream deploy workflow failed — running E2E against
    # a half-deployed API just produces noise.
    if: |
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4
        with:
          # When triggered by workflow_run, the default ref is the workflow
          # file's branch, not the commit that was deployed. Force the actual
          # head SHA so E2E runs against the same code that just shipped.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: e2e

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Sanity-check staging is reachable
        id: probe
        env:
          STAGING_BASE_URL: ${{ vars.STAGING_BASE_URL }}
        run: |
          BASE="${STAGING_BASE_URL:-https://staging.atheon.vantax.co.za}"
          echo "Probing $BASE ..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$BASE" --max-time 10 || echo "000")
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "301" ] && [ "$HTTP_CODE" != "302" ]; then
            echo "::warning::Staging probe returned HTTP $HTTP_CODE — proceeding anyway, but E2E may fail fast."
          fi
          echo "base_url=$BASE" >> "$GITHUB_OUTPUT"

      - name: Run tests against staging
        run: npx playwright test --project=chromium-desktop
        working-directory: e2e
        env:
          CI: true
          E2E_BASE_URL: ${{ steps.probe.outputs.base_url }}
          E2E_LOGIN_EMAIL: ${{ secrets.E2E_STAGING_LOGIN_EMAIL }}
          E2E_LOGIN_PASSWORD: ${{ secrets.E2E_STAGING_LOGIN_PASSWORD }}
          E2E_LOGIN_TOTP_SEED: ${{ secrets.E2E_STAGING_LOGIN_TOTP_SEED }}

      - name: Upload trace + screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: staging-playwright-trace-${{ github.run_id }}
          path: |
            e2e/test-results/
            e2e/playwright-report/
          retention-days: 14
          if-no-files-found: ignore

      - name: Summary
        if: always()
        # Every interpolation that ultimately comes from a user-controllable
        # field (inputs.reason, workflow_run metadata) goes through an env
        # var first — never into the shell directly.
        env:
          BASE_URL: ${{ steps.probe.outputs.base_url }}
          TRIGGER: ${{ github.event_name }}
          UPSTREAM_NAME: ${{ github.event.workflow_run.name }}
          UPSTREAM_RUN: ${{ github.event.workflow_run.run_number }}
          DEPLOYED_SHA: ${{ github.event.workflow_run.head_sha }}
          REASON: ${{ inputs.reason }}
          STATUS: ${{ job.status }}
          RUN_ID: ${{ github.run_id }}
        run: |
          {
            echo "## Staging E2E result"
            echo
            echo "- **Target:** $BASE_URL"
            echo "- **Trigger:** $TRIGGER"
            if [ "$TRIGGER" = "workflow_run" ]; then
              echo "- **Upstream workflow:** $UPSTREAM_NAME #$UPSTREAM_RUN"
              echo "- **Deployed SHA:** \`$DEPLOYED_SHA\`"
            fi
            echo "- **Reason:** ${REASON:-auto (post-deploy)}"
            echo "- **Conclusion:** $STATUS"
            echo
            if [ "$STATUS" = "failure" ]; then
              echo "Trace + screenshots uploaded as \`staging-playwright-trace-${RUN_ID}\`."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
