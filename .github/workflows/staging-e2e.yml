name: Staging E2E

# Runs the Playwright E2E suite against the staging frontend.
# Mirrors production-e2e.yml but targets the staging environment so
# regressions are caught before they hit prod.
#
# Triggers:
#   - workflow_dispatch: manual, used to verify a staging deploy
#   - schedule: hourly during business hours once staging is fully wired
#               (currently no schedule — uncomment the cron once the
#               environment is operational)
#
# Required secrets (in the `staging` GitHub environment):
#   - E2E_STAGING_BASE_URL    — e.g. https://staging.atheon.vantax.co.za
#   - E2E_STAGING_LOGIN_EMAIL — service account seeded on staging
#   - E2E_STAGING_LOGIN_PASSWORD
#   - E2E_STAGING_LOGIN_TOTP_SEED (optional, only if MFA enforced)
#
# The job skips with a clear summary message when secrets are absent
# so the workflow doesn't fail loudly while staging is still being
# stood up. Once the secrets exist, the gate passes and the suite runs.
#
# Provisioning steps to reach a green run:
#   1. wrangler.toml already declares staging.atheon-api.vantax.co.za route.
#   2. Create the DNS record + Cloudflare zone binding for the API host
#      AND for the chosen frontend host (e.g. staging.atheon.vantax.co.za).
#   3. Replace the placeholder D1/KV IDs in workers/api/wrangler.toml under
#      [env.staging] with real values from `wrangler d1 create
#      atheon-db-staging` and `wrangler kv:namespace create CACHE
#      --env staging`.
#   4. Deploy the API: workflow_dispatch deploy-api.yml with
#      environment=staging.
#   5. Deploy a frontend target (Pages or Worker) for the staging host.
#   6. Run the seed (via the admin migrate + seed-vantax endpoint) to
#      hydrate a staging tenant, then mint the E2E service account.
#   7. Add the four E2E_STAGING_* secrets to the `staging` GitHub
#      environment. After that, this workflow runs end-to-end.

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why this run? (logged for audit)'
        required: false
        default: 'manual smoke'
  # Uncomment once staging is fully operational:
  # schedule:
  #   - cron: '0 */4 * * 1-5'  # every 4h, Mon–Fri

concurrency:
  group: staging-e2e
  cancel-in-progress: true

jobs:
  preflight:
    name: Check required secrets
    runs-on: ubuntu-latest
    environment: staging
    outputs:
      ready: ${{ steps.gate.outputs.ready }}
    steps:
      - name: Gate on secrets
        id: gate
        env:
          BASE_URL: ${{ secrets.E2E_STAGING_BASE_URL }}
          LOGIN_EMAIL: ${{ secrets.E2E_STAGING_LOGIN_EMAIL }}
          LOGIN_PASSWORD: ${{ secrets.E2E_STAGING_LOGIN_PASSWORD }}
        run: |
          if [ -z "$BASE_URL" ] || [ -z "$LOGIN_EMAIL" ] || [ -z "$LOGIN_PASSWORD" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            {
              echo "## Staging E2E — skipped"
              echo ""
              echo "One or more required secrets are missing in the \`staging\` environment:"
              echo ""
              echo "- \`E2E_STAGING_BASE_URL\`"
              echo "- \`E2E_STAGING_LOGIN_EMAIL\`"
              echo "- \`E2E_STAGING_LOGIN_PASSWORD\`"
              echo ""
              echo "Provision them once the staging environment is stood up (see workflow file header for steps)."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

  e2e:
    name: Run Playwright suite against staging
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.outputs.ready == 'true'
    environment: staging
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: e2e

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Run tests against staging
        run: npx playwright test --project=chromium-desktop
        working-directory: e2e
        env:
          CI: true
          E2E_BASE_URL: ${{ secrets.E2E_STAGING_BASE_URL }}
          E2E_LOGIN_EMAIL: ${{ secrets.E2E_STAGING_LOGIN_EMAIL }}
          E2E_LOGIN_PASSWORD: ${{ secrets.E2E_STAGING_LOGIN_PASSWORD }}
          E2E_LOGIN_TOTP_SEED: ${{ secrets.E2E_STAGING_LOGIN_TOTP_SEED }}

      - name: Upload trace + screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: staging-playwright-trace-${{ github.run_id }}
          path: |
            e2e/test-results/
            e2e/playwright-report/
          retention-days: 14
          if-no-files-found: ignore

      - name: Summary
        if: always()
        env:
          TARGET: ${{ secrets.E2E_STAGING_BASE_URL }}
          TRIGGER: ${{ github.event_name }}
          REASON: ${{ inputs.reason || 'scheduled' }}
          CONCLUSION: ${{ job.status }}
          RUN_ID: ${{ github.run_id }}
        run: |
          {
            echo "## Staging E2E result"
            echo ""
            echo "- **Target:** $TARGET"
            echo "- **Trigger:** $TRIGGER"
            echo "- **Reason:** $REASON"
            echo "- **Conclusion:** $CONCLUSION"
            echo ""
            if [ "$CONCLUSION" = "failure" ]; then
              echo "Trace + screenshots uploaded as \`staging-playwright-trace-${RUN_ID}\`."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
